<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Party House — Tu entrada</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;600;700&family=Dancing+Script:wght@700&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <header class="navbar">
    <div class="logo">◆ PARTY HOUSE</div>
    <nav>
      <a href="./event-landing.html">Mi invitación</a>
      <a href="./amenidades.html">Amenidades</a>
      <a href="#" id="logoutLink">Salir</a>
    </nav>
  </header>

  <section class="hero" style="min-height:auto; padding-top:140px;">
    <h1>Tu pase está listo</h1>
    <p class="tagline">Presenta este QR en la entrada</p>
  </section>

  <section class="section">
    <div class="ticket" id="ticket">
      <h3 id="eventName">Party House</h3>
      <div style="color:var(--color-text-dim); margin-top:6px; font-size:0.9rem;" id="eventDate"></div>
      <div id="qrWrap" style="background:#fff;padding:10px;border-radius:12px;margin:16px auto 0;display:inline-block;line-height:0;min-width:240px;min-height:240px;">
        <canvas id="qrCanvas" width="240" height="240" style="display:block;"></canvas>
      </div>
      <div style="margin-top:12px;">
        <span style="color:var(--color-text-dim); font-size:0.85rem; letter-spacing:1.5px;">ACCESO</span>
        <div class="code-tag" id="codeTag">---</div>
      </div>
      <div style="margin-top:22px; display:flex; gap:12px; flex-wrap:wrap; justify-content:center;">
        <a id="downloadQrBtn" class="btn btn-primary" href="#">Descargar entrada (PDF)</a>
        <a class="btn" href="https://maps.google.com/?q=14.592153,-90.567311" target="_blank" rel="noopener noreferrer">Ver ubicación</a>
      </div>
      <p style="margin-top:14px; color:var(--color-text-dim); font-size:0.85rem;">
        Presentá este QR al staff en la entrada.
      </p>
    </div>
  </section>

  <footer><div>© Party House</div></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/config.js"></script>
  <script src="./js/app.js"></script>
  <script>
    // Carga qrcode.js intentando varias CDN en cascada.
    // Algunos adblockers o firewalls bloquean jsdelivr pero dejan pasar unpkg/cdnjs.
    window.__qrReady = new Promise((resolve) => {
      const sources = [
        'https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js',
        'https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js',
        'https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.3/qrcode.min.js'
      ];
      let i = 0;
      function tryNext() {
        if (typeof QRCode !== 'undefined') { resolve(true); return; }
        if (i >= sources.length) { resolve(false); return; }
        const s = document.createElement('script');
        s.src = sources[i++];
        s.async = false;
        s.onload  = () => { console.info('[PH] QR CDN OK:', s.src); resolve(true); };
        s.onerror = () => { console.warn('[PH] QR CDN failed:', s.src); tryNext(); };
        document.head.appendChild(s);
      }
      tryNext();
    });
  </script>
  <script>
    const session = window.ph.getSession();
    if (!session) window.location.href = './index.html';

    document.getElementById('logoutLink').addEventListener('click', (e) => {
      e.preventDefault(); window.ph.clearSession(); window.location.href = './index.html';
    });

    // Render robusto del QR con 3 fallbacks:
    //   1) QRCode.toCanvas (librería en la página)
    //   2) QRCode.toDataURL → <img>
    //   3) api.qrserver.com como imagen remota
    // Si todo lo anterior falla, muestra el token como texto para lectura manual.
    async function renderQr(token) {
      const wrap = document.getElementById('qrWrap');
      const canvas = document.getElementById('qrCanvas');

      // Esperamos a que el loader de CDN resuelva (éxito o abandono)
      const libOk = await (window.__qrReady || Promise.resolve(false));

      if (libOk && typeof QRCode !== 'undefined') {
        const opts = { width: 240, margin: 1, color: { dark: '#000000', light: '#FFFFFF' } };
        try {
          await new Promise((ok, bad) => QRCode.toCanvas(canvas, token, opts, e => e ? bad(e) : ok()));
          return;
        } catch (e) { console.warn('[PH] toCanvas falló:', e); }
        try {
          const url = await new Promise((ok, bad) => QRCode.toDataURL(token, opts, (e, u) => e ? bad(e) : ok(u)));
          wrap.innerHTML = '<img src="' + url + '" alt="QR" style="display:block;width:240px;height:240px;"/>';
          return;
        } catch (e) { console.warn('[PH] toDataURL falló:', e); }
      }

      // Fallback final: servicio externo api.qrserver.com
      console.warn('[PH] usando fallback api.qrserver.com');
      const safe = encodeURIComponent(token);
      const img = new Image();
      img.width = 240; img.height = 240;
      img.alt = 'QR';
      img.style.cssText = 'display:block;width:240px;height:240px;';
      img.onload  = () => { wrap.innerHTML = ''; wrap.appendChild(img); };
      img.onerror = () => {
        wrap.innerHTML =
          '<p style="color:#c00;font-family:Inter,sans-serif;font-size:12px;padding:20px;text-align:center;line-height:1.4;">' +
          'No se pudo generar el QR.<br/>Mostrá este código al staff:<br/>' +
          '<strong style="word-break:break-all;font-family:monospace;">' + token + '</strong></p>';
      };
      img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=240x240&margin=4&data=' + safe;
    }

    async function loadTicket() {
      const ticketBox = document.getElementById('ticket');
      try {
        const { data, error } = await window.ph.supabase.rpc('rpc_get_my_ticket', { p_code: session.code });
        if (error || !data || data.error) {
          console.warn('[PH] rpc_get_my_ticket', { error, data });
          ticketBox.innerHTML = '<p style="color:#ff7a9c;">No encontramos un ticket asociado a tu código.</p>';
          return;
        }
        document.getElementById('eventName').textContent = data.event.name;
        document.getElementById('eventDate').textContent = window.ph.formatDate(data.event.event_date);
        document.getElementById('codeTag').textContent = session.code;
        renderQr(String(data.ticket.qr_token || session.code));

        // Botón "Descargar QR" → PNG desde el server (512px, buena calidad de impresión).
        const dl = document.getElementById('downloadQrBtn');
        dl.href = '/api/qr/' + encodeURIComponent(session.code) + '/download';

      } catch (e) {
        console.error('[PH] loadTicket error:', e);
        ticketBox.innerHTML = '<p style="color:#ff7a9c;">Error cargando el ticket: ' + (e.message || e) + '</p>';
      }
    }
    loadTicket();
  </script>
</body>
</html>
